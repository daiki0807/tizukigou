<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地図記号クイズ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif;
      background: linear-gradient(135deg, #1a73e8 0%, #6c3db5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 32px 28px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 24px 72px rgba(0,0,0,0.35);
      text-align: center;
    }

    /* ── START ── */
    .start-icon { font-size: 4.5rem; margin-bottom: 12px; }
    .start-title {
      font-size: 2rem;
      font-weight: bold;
      color: #2c3e8c;
      margin-bottom: 6px;
    }
    .start-sub { color: #777; margin-bottom: 24px; font-size: 0.95rem; }
    .start-info {
      background: #f0f6ff;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 28px;
      text-align: left;
      color: #445;
      font-size: 0.9rem;
      line-height: 1.8;
    }

    /* ── PROGRESS ── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .progress-wrap {
      flex: 1;
      background: #eee;
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-label { font-size: 0.82rem; color: #888; white-space: nowrap; }
    .score-badge {
      font-size: 0.82rem;
      font-weight: bold;
      color: #2c3e8c;
      background: #e8f0fe;
      border-radius: 99px;
      padding: 4px 10px;
      white-space: nowrap;
    }

    /* ── QUESTION TYPE BADGE ── */
    .type-badge {
      display: inline-block;
      font-size: 0.78rem;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 12px;
      font-weight: bold;
    }
    .type-a { background: #e8f0fe; color: #1a56c4; }
    .type-b { background: #fef3e2; color: #b45a00; }

    /* ── SYMBOL BOX ── */
    .symbol-box {
      background: #f5f7ff;
      border-radius: 18px;
      padding: 28px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #e0e7ff;
    }
    .symbol-box svg { width: 96px; height: 96px; }

    /* ── DESCRIPTION BOX ── */
    .desc-box {
      background: #fffbea;
      border: 1px solid #ffe08a;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #6b4e00;
      text-align: left;
    }
    .question-label {
      font-size: 1rem;
      color: #444;
      margin-bottom: 16px;
    }

    /* ── CHOICES ── */
    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .choice-btn {
      padding: 14px 8px;
      border: 2.5px solid #dde;
      border-radius: 14px;
      background: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
      line-height: 1.4;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: #1a73e8;
      background: #f0f6ff;
      transform: translateY(-2px);
    }
    .choice-btn:active:not(:disabled) { transform: translateY(0); }
    .choice-btn.correct  { border-color: #34a853; background: #e6f4ea; color: #1e6e37; font-weight: bold; }
    .choice-btn.wrong    { border-color: #ea4335; background: #fce8e6; color: #b31d11; }
    .choice-btn:disabled { cursor: default; }

    /* ── FEEDBACK ── */
    .feedback {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.92rem;
      margin-bottom: 16px;
      display: none;
      text-align: left;
      line-height: 1.5;
    }
    .feedback.show      { display: block; }
    .feedback.ok  { background: #e6f4ea; border: 1px solid #a8d5b5; color: #1e6e37; }
    .feedback.ng  { background: #fce8e6; border: 1px solid #f5b9b4; color: #b31d11; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-block;
      padding: 14px 36px;
      border: none;
      border-radius: 99px;
      font-size: 1.05rem;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #1a73e8, #6c3db5);
      color: #fff;
      box-shadow: 0 4px 18px rgba(26,115,232,0.4);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,115,232,0.45); }
    .btn-secondary {
      background: #f1f3f4;
      color: #444;
    }
    .btn-secondary:hover { background: #e3e6e8; }

    /* ── RESULT ── */
    .result-emoji { font-size: 3.5rem; margin-bottom: 12px; }
    .result-title { font-size: 1.6rem; font-weight: bold; color: #2c3e8c; margin-bottom: 20px; }
    .score-ring {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 32px rgba(247,151,30,0.4);
    }
    .score-ring .num { font-size: 2.8rem; font-weight: bold; color: #fff; line-height: 1; }
    .score-ring .den { font-size: 0.9rem; color: rgba(255,255,255,0.9); }
    .result-msg { font-size: 1.05rem; color: #555; margin-bottom: 8px; }
    .result-pct { font-size: 0.9rem; color: #888; margin-bottom: 28px; }
    .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    /* ── REVIEW TABLE ── */
    .review-wrap {
      max-height: 340px;
      overflow-y: auto;
      margin-bottom: 20px;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { background: #f5f7ff; padding: 8px 10px; color: #445; font-weight: bold; position: sticky; top: 0; }
    td { padding: 8px 10px; border-top: 1px solid #f0f0f0; vertical-align: middle; }
    td svg { width: 36px; height: 36px; }
    .ok-mark { color: #34a853; font-weight: bold; }
    .ng-mark { color: #ea4335; font-weight: bold; }

    @media (max-width: 400px) {
      .card { padding: 24px 16px; }
      .choices { grid-template-columns: 1fr; }
      .start-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
<div class="card" id="app"></div>

<script>

      <path d="M30,14 L52,22 L52,50 L30,42 Z" stroke="#222" stroke-width="3" fill="none" stroke-linejoin="round"/>

  {

      <rect x="8" y="20" width="44" height="20" stroke="#222" stroke-width="3.5" fill="none" rx="1"/>
      <line x1="8"  y1="16" x2="8"  y2="44" stroke="#222" stroke-width="4.5" stroke-linecap="round"/>

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let state = { screen: 'start', questions: [], idx: 0, score: 0, answers: [], answered: false };

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions() {
  return shuffle(SYMBOLS).map((sym, qi) => {
    const wrong = shuffle(SYMBOLS.filter(s => s.name !== sym.name)).slice(0, 3).map(s => s.name);
    // alternate question type: even = symbol→name, odd = desc→name
    const type = qi % 2 === 0 ? 'A' : 'B';
    return { sym, choices: shuffle([sym.name, ...wrong]), type };
  });
}

function scoreMsg(score, total) {
  const pct = score / total;
  if (pct === 1)   return ['🏆', 'かんぺき！地図記号マスターだ！'];
  if (pct >= 0.8)  return ['🌟', 'すばらしい！ほぼかんぺき！'];
  if (pct >= 0.6)  return ['😊', 'よくできました！もう少しで完ぺき！'];
  if (pct >= 0.4)  return ['💪', 'もう一回チャレンジしてみよう！'];
  return ['📚', '地図記号を勉強してからもう一度！'];
}

// ════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════
const app = document.getElementById('app');

function render() {
  switch (state.screen) {
    case 'start':  renderStart();  break;
    case 'quiz':   renderQuiz();   break;
    case 'result': renderResult(); break;
  }
}

function renderStart() {
  app.innerHTML = `
    <div class="start-icon">🗺️</div>
    <div class="start-title">地図記号クイズ</div>
    <p class="start-sub">地図にかかれた記号の名前を当てよう！</p>
    <div class="start-info">
      📍 記号を見て、正しい名前を4つの中から選ぼう！<br>
      📍 偶数問は「もとになったもの」のせつめいから考えよう！<br>
      📍 全${SYMBOLS.length}問に挑戦！
    </div>
    <button class="btn btn-primary" id="startBtn">スタート！</button>
  `;
  document.getElementById('startBtn').onclick = startQuiz;
}

function renderQuiz() {
  const q   = state.questions[state.idx];
  const tot = state.questions.length;
  const pct = (state.idx / tot) * 100;
  const isA = q.type === 'A';

  app.innerHTML = `
    <div class="top-bar">
      <div class="progress-wrap">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="progress-label">${state.idx + 1} / ${tot}</div>
      <div class="score-badge">✅ ${state.score}</div>
    </div>

    <span class="type-badge ${isA ? 'type-a' : 'type-b'}">
      ${isA ? '🔍 記号の名前を当てよう！' : '💬 せつめいから当てよう！'}
    </span>

    ${isA
      ? `<div class="symbol-box">${q.sym.svg}</div>`
      : `<div class="desc-box">💡 もとになったもの：<br><strong>${q.sym.desc}</strong></div>`
    }

    <p class="question-label">この地図記号は何の場所？</p>

    <div class="choices" id="choices">
      ${q.choices.map((c, i) => `
        <button class="choice-btn" data-idx="${i}">${c}</button>
      `).join('')}
    </div>

    <div class="feedback" id="feedback"></div>

    <div id="nextWrap" style="display:none;margin-top:4px">
      <button class="btn btn-primary" id="nextBtn">
        ${state.idx + 1 < tot ? '次の問題 →' : '結果を見る！'}
      </button>
    </div>
  `;

  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => selectAnswer(parseInt(btn.dataset.idx)));
  });
}

function selectAnswer(idx) {
  if (state.answered) return;
  state.answered = true;

  const q       = state.questions[state.idx];
  const chosen  = q.choices[idx];
  const correct = q.sym.name;
  const isOK    = chosen === correct;

  if (isOK) state.score++;
  state.answers.push({ q, chosen, isOK });

  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true;
    const val = q.choices[parseInt(btn.dataset.idx)];
    if (val === correct) btn.classList.add('correct');
    else if (val === chosen) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  fb.className = `feedback show ${isOK ? 'ok' : 'ng'}`;
  if (isOK) {
    fb.innerHTML = `⭕ 正解！「<strong>${correct}</strong>」だよ！<br><small>もとになったもの：${q.sym.desc}</small>`;
  } else {
    fb.innerHTML = `❌ ざんねん… 正しくは「<strong>${correct}</strong>」だよ。<br><small>もとになったもの：${q.sym.desc}</small>`;
  }

  document.getElementById('nextWrap').style.display = 'block';
  document.getElementById('nextBtn').onclick = nextQuestion;
}

function nextQuestion() {
  state.idx++;
  state.answered = false;
  if (state.idx >= state.questions.length) {
    state.screen = 'result';
  }
  render();
}

function renderResult() {
  const tot = state.questions.length;
  const [emoji, msg] = scoreMsg(state.score, tot);
  const pct = Math.round((state.score / tot) * 100);

  // build review rows
  const rows = state.answers.map(({ q, chosen, isOK }) => `
    <tr>
      <td>${isOK ? '<span class="ok-mark">⭕</span>' : '<span class="ng-mark">❌</span>'}</td>
      <td>${q.sym.svg}</td>
      <td style="text-align:left">${q.sym.name}</td>
      <td style="text-align:left;color:${isOK ? '#1e6e37' : '#b31d11'}">${isOK ? '正解' : chosen}</td>
    </tr>
  `).join('');

  app.innerHTML = `
    <div class="result-emoji">${emoji}</div>
    <div class="result-title">クイズ終了！</div>
    <div class="score-ring">
      <div class="num">${state.score}</div>
      <div class="den">/ ${tot} 問</div>
    </div>
    <p class="result-msg">${msg}</p>
    <p class="result-pct">正かい率：<strong>${pct}%</strong></p>

    <div class="review-wrap">
      <table>
        <thead>
          <tr>
            <th>結果</th>
            <th>記号</th>
            <th>正しい名前</th>
            <th>あなたの答え</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="retryBtn">もう一度チャレンジ！</button>
      <button class="btn btn-secondary" id="topBtn">最初に戻る</button>
    </div>
  `;
  document.getElementById('retryBtn').onclick = startQuiz;
  document.getElementById('topBtn').onclick = () => { state.screen = 'start'; render(); };
}

// ════════════════════════════════════════════
// MAIN
// ════════════════════════════════════════════
function startQuiz() {
  state = { screen: 'quiz', questions: buildQuestions(), idx: 0, score: 0, answers: [], answered: false };
  render();
}

render();
</script>
</body>
</html>
