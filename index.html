<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地図記号クイズ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif;
      background: linear-gradient(135deg, #1a73e8 0%, #6c3db5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 32px 28px;
      max-width: 540px;
      width: 100%;
      box-shadow: 0 24px 72px rgba(0,0,0,0.35);
      text-align: center;
    }

    /* ── START ── */
    .start-icon { font-size: 4.5rem; margin-bottom: 12px; }
    .start-title { font-size: 2rem; font-weight: bold; color: #2c3e8c; margin-bottom: 6px; }
    .start-sub { color: #777; margin-bottom: 24px; font-size: 0.95rem; }
    .start-info {
      background: #f0f6ff; border-radius: 14px;
      padding: 16px; margin-bottom: 28px;
      text-align: left; color: #445;
      font-size: 0.9rem; line-height: 2;
    }

    /* ── PROGRESS ── */
    .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .progress-wrap { flex: 1; background: #eee; border-radius: 99px; height: 10px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-label { font-size: 0.82rem; color: #888; white-space: nowrap; }
    .score-badge {
      font-size: 0.82rem; font-weight: bold;
      color: #2c3e8c; background: #e8f0fe;
      border-radius: 99px; padding: 4px 10px; white-space: nowrap;
    }

    /* ── TYPE BADGE ── */
    .type-badge {
      display: inline-block; font-size: 0.78rem;
      padding: 4px 12px; border-radius: 99px;
      margin-bottom: 14px; font-weight: bold;
    }
    .type-a { background: #e8f0fe; color: #1a56c4; }
    .type-b { background: #fef3e2; color: #b45a00; }

    /* ── SYMBOL BOX (Type A: question) ── */
    .symbol-box {
      background: #f5f7ff; border-radius: 18px;
      padding: 28px; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid #e0e7ff;
    }
    .symbol-box svg { width: 100px; height: 100px; }

    /* ── NAME BOX (Type B: question) ── */
    .name-box {
      background: #f5f7ff; border-radius: 18px;
      padding: 28px 20px; margin-bottom: 16px;
      border: 2px solid #e0e7ff;
    }
    .name-kanji { font-size: 2.2rem; font-weight: bold; color: #2c3e8c; }
    .name-kana  { font-size: 1rem; color: #667; margin-top: 4px; }

    .question-label { font-size: 1rem; color: #444; margin-bottom: 16px; }

    /* ── TEXT CHOICES (Type A) ── */
    .choices-text { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .choice-text-btn {
      padding: 14px 8px;
      border: 2.5px solid #dde; border-radius: 14px;
      background: #fff; font-size: 0.95rem;
      font-family: inherit; cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
      line-height: 1.4;
    }
    .choice-text-btn:hover:not(:disabled) {
      border-color: #1a73e8; background: #f0f6ff; transform: translateY(-2px);
    }

    /* ── SVG CHOICES (Type B) ── */
    .choices-sym { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .choice-sym-btn {
      padding: 16px; aspect-ratio: 1;
      border: 2.5px solid #dde; border-radius: 14px;
      background: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
    }
    .choice-sym-btn svg { width: 68px; height: 68px; pointer-events: none; }
    .choice-sym-btn:hover:not(:disabled) {
      border-color: #1a73e8; background: #f0f6ff; transform: translateY(-2px);
    }
    .choice-sym-btn:active:not(:disabled) { transform: translateY(0); }

    /* Shared correct/wrong states */
    .correct { border-color: #34a853 !important; background: #e6f4ea !important; }
    .wrong   { border-color: #ea4335 !important; background: #fce8e6 !important; }
    .choice-text-btn.correct { color: #1e6e37; font-weight: bold; }
    .choice-text-btn.wrong   { color: #b31d11; }
    .choice-text-btn:disabled, .choice-sym-btn:disabled { cursor: default; }

    /* ── FEEDBACK ── */
    .feedback {
      padding: 12px 16px; border-radius: 12px;
      font-size: 0.92rem; margin-bottom: 16px;
      display: none; text-align: left; line-height: 1.6;
    }
    .feedback.show  { display: block; }
    .feedback.ok    { background: #e6f4ea; border: 1px solid #a8d5b5; color: #1e6e37; }
    .feedback.ng    { background: #fce8e6; border: 1px solid #f5b9b4; color: #b31d11; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-block; padding: 14px 36px;
      border: none; border-radius: 99px;
      font-size: 1.05rem; font-family: inherit;
      font-weight: bold; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #1a73e8, #6c3db5);
      color: #fff; box-shadow: 0 4px 18px rgba(26,115,232,0.4);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,115,232,0.45); }
    .btn-secondary { background: #f1f3f4; color: #444; }
    .btn-secondary:hover { background: #e3e6e8; }

    /* ── RESULT ── */
    .result-emoji { font-size: 3.5rem; margin-bottom: 12px; }
    .result-title { font-size: 1.6rem; font-weight: bold; color: #2c3e8c; margin-bottom: 20px; }
    .score-ring {
      width: 140px; height: 140px; border-radius: 50%;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 32px rgba(247,151,30,0.4);
    }
    .score-ring .num { font-size: 2.8rem; font-weight: bold; color: #fff; line-height: 1; }
    .score-ring .den { font-size: 0.9rem; color: rgba(255,255,255,0.9); }
    .result-msg  { font-size: 1.05rem; color: #555; margin-bottom: 8px; }
    .result-pct  { font-size: 0.9rem; color: #888; margin-bottom: 28px; }
    .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    /* ── REVIEW TABLE ── */
    .review-wrap {
      max-height: 340px; overflow-y: auto;
      margin-bottom: 20px; border-radius: 12px;
      border: 1px solid #e0e0e0;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { background: #f5f7ff; padding: 8px 10px; color: #445; font-weight: bold; position: sticky; top: 0; }
    td { padding: 8px 10px; border-top: 1px solid #f0f0f0; vertical-align: middle; }
    td svg { width: 36px; height: 36px; }
    .ok-mark { color: #34a853; font-weight: bold; }
    .ng-mark  { color: #ea4335; font-weight: bold; }

    @media (max-width: 400px) {
      .card { padding: 24px 16px; }
      .start-title { font-size: 1.6rem; }
      .choice-sym-btn svg { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>
<div class="card" id="app"></div>

// STATE

let state = { screen: 'start', questions: [], idx: 0, score: 0, answers: [], answered: false };

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions() {
  return shuffle(SYMBOLS).map((sym, qi) => {
    const wrongSyms = shuffle(SYMBOLS.filter(s => s.name !== sym.name)).slice(0, 3);
    const choiceSyms = shuffle([sym, ...wrongSyms]);
    // Type A: 記号→名前  /  Type B: 名前→記号
    const type = qi % 2 === 0 ? 'A' : 'B';
    return { sym, choiceSyms, type };
  });
}

function scoreMsg(score, total) {
  const p = score / total;
  if (p === 1)  return ['🏆', 'かんぺき！地図記号マスターだ！'];
  if (p >= 0.8) return ['🌟', 'すばらしい！ほぼかんぺき！'];
  if (p >= 0.6) return ['😊', 'よくできました！もう少しで完ぺき！'];
  if (p >= 0.4) return ['💪', 'もう一回チャレンジしてみよう！'];
  return ['📚', '地図記号を勉強してからもう一度！'];
}

function renderQuiz() {
  const q   = state.questions[state.idx];
  const tot = state.questions.length;
  const pct = (state.idx / tot) * 100;
  const isA = q.type === 'A';

  // Build choice HTML
  const choicesHtml = isA
    ? `<div class="choices-text" id="choices">
        ${q.choiceSyms.map((s, i) => `
          <button class="choice-text-btn" data-idx="${i}">${s.name}</button>
        `).join('')}
       </div>`
    : `<div class="choices-sym" id="choices">
        ${q.choiceSyms.map((s, i) => `
          <button class="choice-sym-btn" data-idx="${i}">${s.svg}</button>
        `).join('')}
       </div>`;

  app.innerHTML = `
    <div class="top-bar">
      <div class="progress-wrap">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="progress-label">${state.idx + 1} / ${tot}</div>
      <div class="score-badge">✅ ${state.score}</div>
    </div>

    <span class="type-badge ${isA ? 'type-a' : 'type-b'}">
      ${isA ? '🔍 記号の名前はなに？' : '💬 名前の記号はどれ？'}
    </span>

    ${isA
      ? `<div class="symbol-box">${q.sym.svg}</div>`
      : `<div class="name-box">
           <div class="name-kanji">${q.sym.short}</div>
           <div class="name-kana">${q.sym.name}</div>
         </div>`
    }

    <p class="question-label">
      ${isA ? 'この地図記号は何の場所？' : 'この場所の地図記号はどれ？'}
    </p>

    ${choicesHtml}

    <div class="feedback" id="feedback"></div>
    <div id="nextWrap" style="display:none;margin-top:4px">
      <button class="btn btn-primary" id="nextBtn">
        ${state.idx + 1 < tot ? '次の問題 →' : '結果を見る！'}
      </button>
    </div>
  `;

  document.querySelectorAll('[data-idx]').forEach(btn => {
    btn.addEventListener('click', () => selectAnswer(parseInt(btn.dataset.idx)));
  });
}

function selectAnswer(idx) {
  if (state.answered) return;
  state.answered = true;

  const q      = state.questions[state.idx];
  const chosen = q.choiceSyms[idx];
  const isOK   = chosen.name === q.sym.name;

  if (isOK) state.score++;
  state.answers.push({ q, chosen, isOK });

  document.querySelectorAll('[data-idx]').forEach(btn => {
    btn.disabled = true;
    const s = q.choiceSyms[parseInt(btn.dataset.idx)];
    if (s.name === q.sym.name)     btn.classList.add('correct');
    else if (s.name === chosen.name) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  fb.className = `feedback show ${isOK ? 'ok' : 'ng'}`;
  fb.innerHTML = isOK
    ? `⭕ 正解！「<strong>${q.sym.name}</strong>」だよ！<br><small>💡 ${q.sym.desc}</small>`
    : `❌ ざんねん… 正しくは「<strong>${q.sym.name}</strong>」だよ。<br><small>💡 ${q.sym.desc}</small>`;

  document.getElementById('nextWrap').style.display = 'block';
  document.getElementById('nextBtn').onclick = nextQuestion;
}

function nextQuestion() {
  state.idx++;
  state.answered = false;
  if (state.idx >= state.questions.length) {
    state.screen = 'result';
  }
  render();
}

function renderResult() {
  const tot = state.questions.length;
  const [emoji, msg] = scoreMsg(state.score, tot);
  const pct = Math.round((state.score / tot) * 100);

  const rows = state.answers.map(({ q, isOK }) => `
    <tr>
      <td>${isOK ? '<span class="ok-mark">⭕</span>' : '<span class="ng-mark">❌</span>'}</td>
      <td>${q.type === 'A' ? '記号→名前' : '名前→記号'}</td>
      <td>${q.sym.svg}</td>
      <td style="text-align:left">${q.sym.name}</td>
    </tr>
  `).join('');

  app.innerHTML = `
    <div class="result-emoji">${emoji}</div>
    <div class="result-title">クイズ終了！</div>
    <div class="score-ring">
      <div class="num">${state.score}</div>
      <div class="den">/ ${tot} 問</div>
    </div>
    <p class="result-msg">${msg}</p>
    <p class="result-pct">正かい率：<strong>${pct}%</strong></p>

    <div class="review-wrap">
      <table>
        <thead>
          <tr><th>結果</th><th>形式</th><th>記号</th><th>正しい名前</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary"   id="retryBtn">もう一度チャレンジ！</button>
      <button class="btn btn-secondary" id="topBtn">最初に戻る</button>
    </div>
  `;
  document.getElementById('retryBtn').onclick = startQuiz;
  document.getElementById('topBtn').onclick = () => { state.screen = 'start'; render(); };
}

// ════════════════════════════════════════════
// MAIN
// ════════════════════════════════════════════
function startQuiz() {
  state = { screen: 'quiz', questions: buildQuestions(), idx: 0, score: 0, answers: [], answered: false };
  render();
}

render();
</script>
</body>
</html>
